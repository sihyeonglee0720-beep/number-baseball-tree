<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>숫자야구 전략 트리</title>

<style>
    body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        background: #f5f6f8;
        color: #111;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        width: 90%;
        max-width: 720px;
        background: white;
        border: 1px solid #ddd;
        border-radius: 20px;
        padding: 40px 32px;
        box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        text-align: center;
    }

    h1 {
        margin: 0 0 12px;
        font-size: 32px;
    }

    .desc {
        color: #555;
        line-height: 1.7;
        margin-bottom: 32px;
        font-size: 15px;
    }

    .menu {
        display: flex;
        gap: 16px;
        justify-content: center;
        flex-wrap: wrap;
    }

    .card {
        width: 240px;
        padding: 24px 18px;
        border: 2px solid #222;
        border-radius: 16px;
        text-decoration: none;
        color: #111;
        background: #ffffff;
        transition: 0.2s;
    }

    .card:hover {
        transform: translateY(-4px);
        background: #eef3ff;
        border-color: #4d7cff;
    }

    .card-title {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 8px;
    }

    .card-desc {
        font-size: 14px;
        color: #555;
        line-height: 1.5;
    }

    .footer {
        margin-top: 32px;
        font-size: 13px;
        color: #777;
    }
    .author {
    font-size: 11px;
    color: #999;
    }
</style>
</head>

<body>

<div class="container">
    <h1>숫자야구 정보량 기반 질문 추천 트리</h1>

    <div class="desc">
        Information Gain(정보량)을 기준으로 생성한 숫자야구 질문 추천 트리입니다.<br>
        첫 질문을 직접 설정한 뒤, 결과 버튼을 따라가며 다음 추천 질문을 확인할 수 있습니다.
    </div>

    <div class="menu">
        <a class="card" href="information_gain_tree_3digit.html">
            <div class="card-title">3자리</div>
            <div class="card-desc">
                정보량 기반<br>
                3자리 숫자야구 질문 추천 트리
            </div>
        </a>

        <a class="card" href="information_gain_tree_4digit.html">
            <div class="card-title">4자리</div>
            <div class="card-desc">
                정보량 기반<br>
                4자리 숫자야구 질문 추천 트리
            </div>
        </a>
    </div>

    <div class="footer">
        Information Gain Number Baseball Tree<br>
        <span class="author">
            Designed & Developed by Si hyeong Lee
        </span>
    </div>
</div>

</body>
</html>
